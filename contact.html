<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — Meyzine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-container"></div>

  <!-- CONTACTO -->
  <section class="contact-section page-content">
    <h2 class="section-title">Contacto</h2>

    <div class="contact-grid">

      <!-- Bloque email -->
      <div class="contact-block">
        <p class="contact-label">EMAIL</p>
        <a href="mailto:dosmey@yahoo.com" class="contact-value">dosmey@yahoo.com</a>
      </div>

      <!-- Bloque estudio -->
      <div class="contact-block">
        <p class="contact-label">ESTUDIO</p>
        <p class="contact-value">Av. Alvarez Thomas 2318<br>CABA, Argentina</p>
      </div>

      <!-- Bloque instagram -->
      <div class="contact-block">
        <p class="contact-label">INSTAGRAM</p>
        <a href="https://instagram.com/oumaigodismey" target="_blank" rel="noopener" class="contact-value">@oumaigodismey</a>
      </div>

    </div>

    <!-- Mapa de Google Maps embebido -->
    <div class="contact-map">
      <iframe
        title="Ubicación del estudio"
        src="https://maps.google.com/maps?q=Av.+Alvarez+Thomas+2318,+Buenos+Aires,+Argentina&output=embed"
        width="100%"
        height="400"
        style="border: 0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="scripts/components.js"></script>
</body>
</html>
