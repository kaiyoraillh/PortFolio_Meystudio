<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meystudio — Mariano Yoraillh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- El nav se inyecta automáticamente desde scripts/components.js -->
  <div id="nav-container"></div>

  <!-- HERO: título y video en la misma fila -->
  <section class="hero">
    <div class="hero-row">

      <h1 class="hero-title">HOLA!</h1>

      <video
        class="hero-video"
        autoplay
        loop
        muted
        playsinline
        preload="metadata">
        <source src="Assets/videos/portfolio_video_optimized.mp4" type="video/mp4">
      </video>

    </div>
  </section>

  <!-- SUSCRIPCIÓN MEYZINE -->
  <section class="form-section">
    <h2 class="meyzine-title">MEYZINE</h2>
    <p class="meyzine-subtitle">DEJA TU EMAIL Y QUIZÁ RECIBAS UN MEYZINE</p>

    <form id="contact-form" class="contact-form" novalidate>

      <div class="newsletter-row">
        <input type="email" id="email" name="email" class="newsletter-input" placeholder="tu@email.com" required />
        <button type="submit" class="form-button">Enviar</button>
      </div>

      <!-- Mensaje de respuesta (éxito o error) -->
      <p id="form-status" class="form-status" aria-live="polite"></p>

    </form>
  </section>

  <!-- El footer se inyecta automáticamente desde scripts/components.js -->
  <div id="footer-container"></div>

  <script src="scripts/components.js"></script>
  <script src="scripts/contact-form.js"></script>

</body>
</html>
