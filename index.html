<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meystudio — Mariano Yoraillh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- El nav se inyecta automáticamente desde scripts/components.js -->
  <div id="nav-container"></div>

  <!-- HERO: primera sección que ve el usuario -->
  <section class="hero">
    <p class="hero-label">Portfolio</p>
    <h1 class="hero-title">HOLA!</h1>
    <p class="hero-artist">Mariano Yoraillh</p>
  </section>

  <!-- FORMULARIO DE CONTACTO -->
  <section class="form-section">
    <h2 class="page-title">CONTACTO</h2>

    <form id="contact-form" class="contact-form" novalidate>

      <div class="form-group">
        <label for="name" class="form-label">Nombre</label>
        <input type="text" id="name" name="name" class="form-input" placeholder="Tu nombre" required />
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="tu@email.com" required />
      </div>

      <div class="form-group">
        <label for="message" class="form-label">Mensaje</label>
        <textarea id="message" name="message" class="form-input form-textarea" placeholder="Tu mensaje..." required></textarea>
      </div>

      <!-- Mensaje de respuesta (éxito o error) -->
      <p id="form-status" class="form-status" aria-live="polite"></p>

      <button type="submit" class="form-button">Enviar</button>

    </form>
  </section>

  <!-- El footer se inyecta automáticamente desde scripts/components.js -->
  <div id="footer-container"></div>

  <script src="scripts/components.js"></script>
  <script src="scripts/contact-form.js"></script>
</body>
</html>
