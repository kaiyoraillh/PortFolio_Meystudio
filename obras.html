<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Meystudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-container"></div>

  <!-- GALERÍA DE OBRAS -->
  <section class="gallery-section page-content">
    <h2 class="page-title">Portfolio.</h2>
    <!-- Las obras se generan desde script.js -->
    <div id="gallery-grid" class="gallery-grid"></div>
  </section>

  <!-- LIGHTBOX: se muestra al hacer click en una imagen -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" aria-label="Cerrar">×</button>
    <img id="lightbox-img" src="" alt="" class="lightbox-img" />
  </div>

  <!-- SUSCRIPCIÓN MEYZINE -->
  <section class="form-section">
    <h2 class="meyzine-title">MEYZINE</h2>
    <p class="meyzine-subtitle">DEJA TU EMAIL Y QUIZÁ RECIBAS UN MEYZINE</p>
    <form id="contact-form" class="contact-form" novalidate>
      <div class="newsletter-row">
        <input type="email" id="email" name="email" class="newsletter-input" placeholder="tu@email.com" required />
        <button type="submit" class="form-button">Enviar</button>
      </div>
      <p id="form-status" class="form-status" aria-live="polite"></p>
    </form>
  </section>

  <div id="footer-container"></div>

  <script src="scripts/components.js"></script>
  <script src="scripts/contact-form.js"></script>
  <script src="script.js"></script>
</body>
</html>
