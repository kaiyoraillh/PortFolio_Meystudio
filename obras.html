<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Meystudio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="nav-container"></div>

  <!-- GALERÍA DE OBRAS -->
  <section class="gallery-section page-content">
    <h2 class="page-title">Portfolio.</h2>
    <!-- Las obras se generan desde script.js -->
    <div id="gallery-grid" class="gallery-grid"></div>
  </section>

  <!-- LIGHTBOX: se muestra al hacer click en una imagen -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" aria-label="Cerrar">×</button>
    <img id="lightbox-img" src="" alt="" class="lightbox-img" />
  </div>

  <div id="footer-container"></div>

  <script src="scripts/components.js"></script>
  <script src="script.js"></script>
</body>
</html>
